services:
  postgres:
    image: postgres:16-alpine
    container_name: retailmax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retailmax
      POSTGRES_USER: retailmax
      POSTGRES_PASSWORD: retailmax123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmax -d retailmax"]
      interval: 10s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:v0.49.18
    container_name: retailmax-metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_NAME: RetailMax Marketing Analytics
    ports:
      - "3000:3000"
    volumes:
      - ./metabase-data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  metabase-setup:
    image: python:3.12-alpine
    container_name: retailmax-metabase-setup
    depends_on:
      metabase:
        condition: service_healthy
    environment:
      METABASE_URL: http://metabase:3000
      MB_ADMIN_EMAIL: calificar@uvg.edu.gt
      MB_ADMIN_PASSWORD: secret123+
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: retailmax
      PG_USER: retailmax
      PG_PASSWORD: retailmax123
    volumes:
      - ./scripts/setup_metabase.py:/setup_metabase.py:ro
    command: ["python", "/setup_metabase.py"]
    restart: "no"

volumes:
  postgres-data:
